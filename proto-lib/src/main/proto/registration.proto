syntax = "proto3";

import "person.proto";
import "address.proto";

option java_package = "com.github.dkw87.grpc.proto.registration";
option java_multiple_files = true;

package registrationservice;

service RegistrationService {
  rpc GetRegistration (RegistrationRequest) returns (RegistrationResponse);
}

message RegistrationRequest {
  int64 id = 1;
}

message RegistrationResponse {
  string event_name = 1;
  bool wants_to_receive_newsletter = 2;
  personservice.Person person = 3;
  addressservice.Address address = 4;
}